services:
  # 1) Express API
  - type: web
    name: pollution-dashboard-api
    runtime: node
    plan: free
    region: singapore
    rootDir: server
    buildCommand: npm ci
    startCommand: node index.js
    envVars:
      - key: NODE_ENV
        value: production
      # Required: set this in Render dashboard after first deploy
      - key: OPENWEATHER_API_KEY
        sync: false
      # Optional
      - key: DATA_GOV_IN_API_KEY
        sync: false
      # Required: set this to your ML service URL (see README)
      - key: ML_SERVICE_URL
        sync: false

  # 2) FastAPI ML service
  - type: web
    name: pollution-dashboard-ml
    runtime: python
    plan: free
    region: singapore
    rootDir: ml
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"

  # 3) Frontend (static site)
  - type: web
    name: pollution-dashboard-web
    runtime: static
    rootDir: client
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      # Set this to your API service base URL, e.g. https://pollution-dashboard-api.onrender.com
      - key: VITE_API_BASE_URL
        sync: false

